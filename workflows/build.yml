@"
name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: MCModManager.exe
            asset_name: MCModManager-Windows-x64.exe
          - os: ubuntu-latest
            artifact_name: MCModManager
            asset_name: MCModManager-Linux-x64
          - os: macos-latest
            artifact_name: MCModManager
            asset_name: MCModManager-macOS-x64

    runs-on: `${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller requests packaging

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --console --name MCModManager --icon=icon1.ico mc_mod_manager_cli.py

      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        run: pyinstaller --onefile --console --name MCModManager mc_mod_manager_cli.py

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/`${{ matrix.artifact_name }}
          name: MC Mod Manager `${{ github.ref_name }}
        env:
          GITHUB_TOKEN: `${{ secrets.GITHUB_TOKEN }}
"@ | Out-File -Encoding utf8 .github\workflows\build.yml