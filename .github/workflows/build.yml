name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            output: MCModManager-Windows-x64.exe
          - os: ubuntu-latest
            output: MCModManager-Linux-x64
          - os: macos-latest
            output: MCModManager-macOS-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller requests packaging

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --console --name "${{ matrix.output }}" --icon=icon1.ico mc_mod_manager_cli.py

      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        run: pyinstaller --onefile --console --name "${{ matrix.output }}" mc_mod_manager_cli.py

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.output }}
          name: MC Mod Manager ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
